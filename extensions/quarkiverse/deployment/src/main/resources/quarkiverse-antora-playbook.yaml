site:
  title: Quarkiverse Documentation
  url: https://docs.quarkiverse.io
  start_page: index::index.adoc
ui:
  bundle:
    url: https://github.com/quarkiverse/antora-ui-quarkiverse/releases/latest/download/ui-bundle.zip
    snapshot: true
urls:
  redirect_facility: static
  latest_version_segment_strategy: redirect:to
  latest_version_segment: dev
runtime:
  fetch: true
asciidoc:
  attributes:
    page-pagination: '@'
    kroki-fetch-diagram: true
  extensions:
  - asciidoctor-kroki
